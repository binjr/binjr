# Environment variables defined in a calling workflow are not accessible to this reusable workflow. Refer to the documentation for further details on this limitation.
name: build_job
on:
  workflow_call:
    inputs:
      name:
        required: true
        default: ''
        type: string
      chosen-os:
        required: true
        default: ''
        type: string
      wixVersion:
        required: false
        default: ''
        type: string
jobs:
  build_job:
    name: ${{ inputs.name }}
    runs-on: ${{ inputs.chosen-os }}
    steps:
    - name: checkout
      uses: actions/checkout@v4.1.0
    - if: success() && startsWith(github.ref, 'refs/tags/')
      run: echo "IS_TAG=true" >> "$GITHUB_ENV"
      # echo '##vso[task.setvariable variable=isTag;]true'
      shell: bash
    - if: success() && endsWith(github.ref, '-SNAPSHOT')
      run: echo "IS_SNAPSHOT=true" >> "$GITHUB_ENV"
      # echo '##vso[task.setvariable variable=isSnapshot;]true'
      shell: bash
    - uses: actions/setup-java@v4
      with:
          distribution: 'temurin'
          java-version:  ${{ vars.BUILD_JAVA_VERSION}}
          check-latest: true
          cache: 'gradle'
          cache-dependency-path: |
            sub-project/*.gradle*
            sub-project/**/gradle-wrapper.properties
    - if: success() && runner.os == 'Windows_NT'
      env:
        TOOL_DIR: "${{ runner.tool_cache }}"
        WIX_VERSION: "${{ inputs.wixVersion }}"
      run: |-
        curl -LO https://github.com/wixtoolset/wix/releases/download/v%WIX_VERSION%/wix-cli-x64.msi
        msiexec /passive /i wix-cli-x64.msi INSTALLFOLDER="%TOOL_DIR%\wix-cli"
#     # This item has no matching transformer
#     - task: DownloadSecureFile@1
#       name: gpgKeyring
#       displayName: Download GPG Keyring
#       inputs:
#         secureFile: keyring.gpg
#     # This item has no matching transformer
#     - task: DownloadSecureFile@1
#       name: gpgSignKeys
#       displayName: Download GPG Signing keys
#       inputs:
#         secureFile: binjr.package.signing.keys.asc
    - env:
        GPG_KEY_NAME: "${{ secrets.gpg_keyname }}"
        GPG_PASSPHRASE: "${{ secrets.gpg_passphrase }}"
        GPG_KEYRING_PATH: "${{ env.gpgKeyring_secureFilePath }}"
        BINJR_BUILD_NUMBER: "${{ github.run_number }}"
        IS_TAG: "${{ env.isTag }}"
        REPO_TAG_NAME: "${{ github.ref }}"
        GH_PKG_TOKEN: "${{ secrets.gh_pkg_token }}"
        WIX_HOME: "${{ runner.tool_cache }}\\wix-cli\\bin\\"
      run: ./gradlew clean signPackageDistribution --no-daemon
#     # This item has no matching transformer
#     - task: GithubRelease@1
#       condition: and(succeeded(), eq(variables['isTag'], 'true'))
#       inputs:
#         gitHubConnection: binjr-bot
#         repositoryName: binjr/binjr
#         action: edit
#         tag: "${{ github.ref }}"
#         assets: |
#           ${{ github.workspace }}/build/artifacts/deb/*.deb
#           ${{ github.workspace }}/build/artifacts/deb/*.deb.asc
#           ${{ github.workspace }}/build/artifacts/rpm/*.rpm
#           ${{ github.workspace }}/build/artifacts/rpm/*.rpm.asc
#           ${{ github.workspace }}/build/artifacts/dmg/*.dmg
#           ${{ github.workspace }}/build/artifacts/dmg/*.dmg.asc
#           ${{ github.workspace }}/build/artifacts/pkg/*.pkg
#           ${{ github.workspace }}/build/artifacts/pkg/*.pkg.asc
#           ${{ github.workspace }}/build/artifacts/msi/*.msi
#           ${{ github.workspace }}/build/artifacts/msi/*.msi.asc
#           ${{ github.workspace }}/build/artifacts/zip/*.zip
#           ${{ github.workspace }}/build/artifacts/zip/*.zip.asc
#           ${{ github.workspace }}/build/artifacts/tgz/*.tar.gz
#           ${{ github.workspace }}/build/artifacts/tgz/*.tar.gz.asc
#         assetUploadMode: replace
#         releaseNotesSource: filePath
#         releaseNotesFilePath: "${{ github.workspace }}/UNRELEASED.md"
#         addChangeLog: false
#         isPreRelease: "${{ env.IS_SNAPSHOT }}"
    - if: success() && env.isTag == 'true' && env.IS_SNAPSHOT != 'true' && !(contains(github.ref, '-b')) && runner.os == 'Linux'
      run: |-
        echo "**************************************"
        echo "* Install dependencies"
        echo "**************************************"
        wget -qO - https://www.aptly.info/pubkey.txt | sudo apt-key add -
        echo -e '\ndeb http://repo.aptly.info/ squeeze main ' | sudo tee -a /etc/apt/sources.list
        sudo apt update
        sudo apt -y install aptly createrepo-c
        echo "**************************************"
        echo "* GPG setup"
        echo "**************************************"
        export GPG_TTY=${{ env.tty }}
        gpg -v --batch --no-tty --pinentry-mode loopback --passphrase "${{ secrets.gpg_package_passphrase }}" --import ${{ env.gpgSignKeys_secureFilePath }}
        echo "Init GPG" | gpg -v  --pinentry-mode loopback --passphrase "${{ secrets.gpg_package_passphrase }}" --batch --no-tty -u ${{ secrets.gpg_package_keyname }} --sign --armor
        echo "**************************************"
        echo "* Generate apt repo"
        echo "**************************************"
        aptly --distribution="stable" --comment="binjr apt repository" repo create binjr
        aptly repo add binjr  ${{ github.workspace }}/build/artifacts/deb/binjr-*_linux-amd64.deb
        aptly -gpg-key="${{ secrets.gpg_package_keyname }}" publish repo binjr
        echo "**************************************"
        echo "* Signing rpm"
        echo "**************************************"
        echo "%_gpg_name ${{ secrets.gpg_package_keyname }}" >> ~/.rpmmacros
        rpm --addsign -v build/artifacts/rpm/binjr-*_linux-amd64.rpm
        echo "**************************************"
        echo "* Cloning repos.binjr.eu"
        echo "**************************************"
        git clone https://github.com/binjr/repos.binjr.eu.git build/tmp/repos.binjr.eu
        cd  build/tmp/repos.binjr.eu
        echo "https://binjr-bot:${{ secrets.gh_access_token }}@github.com" >> ~/.git-credentials
        git config credential.helper store
        git config user.email "binjr.bot@free.fr"
        git config user.name "binjr-bot"
        rm -rf apt/dists
        rm -rf apt/pool
        cp -r ~/.aptly/public/dists apt/dists
        cp -r ~/.aptly/public/pool apt/pool
        rm -rf rpm/stable
        mkdir rpm/stable
        cp ${{ github.workspace }}/build/artifacts/rpm/binjr-*_linux-amd64.rpm rpm/stable
        echo "**************************************"
        echo "* Generate rpm repo"
        echo "**************************************"
        createrepo_c -v rpm/stable
        gpg -v --batch --no-tty  --pinentry-mode loopback --passphrase "${{ secrets.gpg_package_passphrase }}" -u ${{ secrets.gpg_package_keyname }} --detach-sign --armor rpm/stable/repodata/repomd.xml
        cp ${{ github.workspace }}/distribution/bundlers/linux_rpm/binjr.repo rpm/binjr.repo
        echo "**************************************"
        echo "* Upload to repos.binjr.eu"
        echo "**************************************"
        git add .
        git commit --amend -am "Release  ${{ github.ref }}"
        git push -f
        git config credential.helper cache
        shred -fuz ~/.git-credentials
      shell: bash
